# Конфигурация агента

# Выбор бэкенда: "gigachat" или "lmstudio"
active_backend: "lmstudio"

# Настройки подключений
# temperature - степень случайности, timeout - лимит ожидания (сек.)
backends:
  gigachat:
    model: "GigaChat-2-MAX"
    temperature: 0.2
    timeout: 120
    env_vars:
      base_url: "GIGACHAT_API_URL"
      access_token: "JPY_API_TOKEN"
  
  lmstudio:
    base_url: "http://localhost:1234/v1"
    model: "openai/gpt-oss-20b"
    temperature: 0.3
    timeout: 120

# Logging — логирование и наблюдаемость агента
logging:
  # off — без логов, simple — компактный вывод, detailed — полный (messages, params, memory)
  level: detailed
  # Сырые request/response LLM в логах (без обрезки, для глубокой отладки)
  raw_io: true


  # Цвета для типов сообщений (rich-стили, см. https://rich.readthedocs.io/en/latest/appendix/colors.html)
  colors:
    system: "bright_blue"       # системные промпты
    human: "cyan"               # сообщения пользователя
    assistant: "green"          # ответы LLM (текст)
    reasoning: "bright_green"   # размышления агента
    tool: "yellow"              # вывод инструментов
    tool_name: "bold yellow"    # имя инструмента
    warning: "orange3"          # предупреждения
    error: "bold red"           # ошибки
    state: "bold magenta"       # переходы между состояниями
    tokens: "dim cyan"          # статистика токенов
    memory: "bright_magenta"    # снимки памяти
    run: "bold white"           # границы запуска (start/end)
    info: "dim white"           # служебная информация

  # MLflow Tracking (опционально, требует pip install mlflow)
  mlflow:
    enabled: false              # true — включить авто-логирование в MLflow
    tracking_uri: ""            # адрес MLflow сервера (пусто = локальный ./mlruns)
    experiment: "agent-runs"    # имя эксперимента в MLflow

# рекурсия графа агента (длина цепочки)
agent:
  recursion_limit: 30