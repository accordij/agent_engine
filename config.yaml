# Конфигурация агента

# Выбор бэкенда: "gigachat" или "lmstudio"
active_backend: "lmstudio"

# Настройки подключений
# temperature - степень случайности, timeout - лимит ожидания (сек.)
backends:
  gigachat:
    model: "GigaChat-2-MAX"
    temperature: 0.2
    timeout: 120
    env_vars:
      base_url: "GIGACHAT_API_URL"
      access_token: "JPY_API_TOKEN"
  
  lmstudio:
    base_url: "http://localhost:1234/v1"
    model: "openai/gpt-oss-20b"
    temperature: 0.3
    timeout: 120

# Logging — логирование и наблюдаемость агента
logging:
  # off — без логов, simple — компактный вывод, detailed — полный (messages, params, memory)
  level: detailed
  # Рендерер консольного вывода:
  # off  — не печатать в консоль (файл логов сохраняется),
  # auto — автоматически: ansi для Jupyter/VSCode notebook, rich для терминала,
  # rich — принудительно Rich renderer,
  # ansi — принудительно ANSI renderer.
  renderer: auto
  # Сырые request/response LLM в логах (без обрезки, для глубокой отладки)
  raw_io: false
  # Агрегированный режим для detailed: REQ N | msgs=... in=... out=... + только дельта контекста
  aggregated: true
  # Фильтрация сообщений по ролям:
  # global — влияет на общее логирование (консоль и файл),
  # jupyter — дополнительная фильтрация только для вывода в ноутбуке.
  filters:
    global:
      system: true
      human: true
      tools: true
      assistant: true
      state: true
      memory: true
    jupyter:
      system: true
      human: true
      tools: true
      assistant: true
      state: true
      memory: true


  # Цвета для типов сообщений (rich-стили, см. https://rich.readthedocs.io/en/latest/appendix/colors.html)
  # Default-палитра ниже оптимизирована под dark theme (мягкая колеровка, без агрессивных тонов).
  # Для light theme можно заменить colors на более контрастный вариант (пример в README).
  colors:
    system: "#8fb3ff"           # системные промпты
    human: "green"            # сообщения пользователя
    assistant: "#a6e3a1"        # ответы LLM (текст)
    reasoning: "bright_green"        # размышления агента
    tool: "#f9c97b"             # вывод инструментов
    tool_name: "bold yellow"   # имя инструмента
    warning: "bold #f5c2a8"     # предупреждения
    error: "bold #f38ba8"       # ошибки
    state: "bold #cba6f7"       # переходы между состояниями
    tokens: "#89dceb"           # статистика токенов
    memory: "bright_magenta"    # снимки памяти
    run: "bold magenta"         # границы запуска (start/end)
    info: "#d8dee9"             # служебная информация

  # MLflow Tracking (опционально, требует pip install mlflow)
  mlflow:
    enabled: false              # true — включить авто-логирование в MLflow
    tracking_uri: ""            # адрес MLflow сервера (пусто = локальный ./mlruns)
    experiment: "agent-runs"    # имя эксперимента в MLflow

# рекурсия графа агента (длина цепочки)
agent:
  recursion_limit: 30

# Сессии и чекпоинты агента
sessions:
  # Включить сохранение сессий (LangGraph SqliteSaver)
  enabled: true
  # Путь к SQLite БД (относительно корня проекта)
  db_path: "sessions/checkpoints.db"
  # Путь к реестру сессий и именованных чекпоинтов
  registry_path: "sessions/sessions.json"
  # Максимальное число сессий на одного агента (0 = безлимит)
  # Старые сессии удаляются при загрузке агента.
  # Сессии с именованными чекпоинтами защищены от удаления.
  max_sessions_per_agent: 20


# Streamlit UI
streamlit:
  # Заголовок и иконка вкладки браузера
  page_title: "Агентский движок"
  page_icon: "🤖"

  # Раскладка страницы: "centered" (~700px по центру) или "wide" (вся ширина)
  layout: "wide"
  # Состояние сайдбара при запуске: "expanded" или "collapsed"
  sidebar_state: "expanded"

  # Частота обновления фрагментов (формат: "0.5s", "1s", "2s")
  refresh_sidebar: "1s"    # кнопки Запустить / Стоп
  refresh_feed: "1s"     # лента событий агента

  # Высоты блоков в пикселях
  feed_height_full: 720          # лента без активного вопроса
  feed_height_with_question: 420 # лента когда агент задаёт вопрос
  answer_height: 88              # поле ввода ответа агенту

  # Тема интерфейса: "dark", "light", "catppuccin"
  theme: "light"

  # Размер шрифта основного текста: "small" (13px), "normal" (15px), "large" (17px), "xlarge" (19px)
  font_size: "normal"
  # Размер шрифта вывода инструментов и блоков кода: те же варианты
  font_size_code: "small"